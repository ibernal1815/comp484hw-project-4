<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Typing Speed Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="site-frame">

    <header class="site-header">
      <div class="header-inner">
        <div class="wordmark">
          <span class="wordmark-block"></span>
          TYPIST
        </div>
        <p class="header-sub">measure your speed. beat your record.</p>
      </div>
    </header>

    <main class="layout">

      <section class="card card--prompt">
        <div class="card-label">prompt</div>
        <p id="origin-text-p">Loading...</p>
      </section>

      <section class="card card--input">
        <div class="card-label">your input</div>
        <div class="test-wrapper" id="test-wrapper">
          <textarea
            id="test-area"
            rows="5"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            placeholder="Start typing to begin the test..."
          ></textarea>
          <div class="border-indicator" id="border-indicator"></div>
        </div>
      </section>

      <section class="card card--stats">
        <div class="stat-block stat-block--timer">
          <div class="stat-label">time</div>
          <div class="timer" id="timer">00:00:00</div>
        </div>
        <div class="stat-group">
          <div class="stat-block">
            <div class="stat-label">wpm</div>
            <div class="stat-value" id="wpm">0</div>
          </div>
          <div class="stat-block">
            <div class="stat-label">errors</div>
            <div class="stat-value stat-value--errors" id="error-count">0</div>
          </div>
        </div>
        <button id="reset" class="reset-btn" aria-label="Start over">
          <span class="reset-icon"></span>
          Start Over
        </button>
      </section>

      <section class="card card--scores">
        <div class="card-label">top 3 records</div>
        <ol id="scores-list" class="scores-list">
          <li class="scores-empty">No records yet. Finish a test to set one.</li>
        </ol>
      </section>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
